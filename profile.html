<!-- profile.html -->
<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile · 10x CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
   href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap"
   rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/auth.js"></script>
  <script>
   requireAuth();
  </script>
 </head>
 <body>
  <div id="toast-holder"></div>

  <div class="app">
   <aside class="sidebar">
    <div class="brand">
     <div class="brand-mark">10x</div>
     <div class="brand-name">10x<span>CRM</span></div>
    </div>
    <nav class="nav">
     <a class="nav-item" href="dashboard.html"
      ><span class="ic">D</span>Dashboard</a
     >
     <a class="nav-item" href="clients.html"
      ><span class="ic">C</span>Clients</a
     >
     <a class="nav-item active" href="profile.html"
      ><span class="ic">P</span>Profile</a
     >
    </nav>
    <div class="sidebar-foot">
     <button class="logout-btn" onclick="handleLogout()">Log out</button>
    </div>
   </aside>

   <main class="main">
    <header class="topbar">
     <div>
      <div class="page-title">Profile</div>
      <div class="page-sub">Your account</div>
     </div>
     <div class="top-actions">
      <button
       class="theme-toggle"
       id="theme-toggle-btn"
       onclick="toggleTheme()"
      >
       🌙
      </button>
      <div class="avatar" id="topbar-avatar">–</div>
     </div>
    </header>

    <div class="content">
     <div class="profile-head">
      <div class="p-avatar" id="p-avatar">–</div>
      <div>
       <div class="p-name" id="p-name">–</div>
       <div class="p-role">Sales lead</div>
       <div class="badge">S-Rank Shinobi this quarter</div>
      </div>
     </div>

     <div class="profile-layout">
      <div class="profile-col-main">
       <div class="card">
        <div class="sec-title">Details</div>
        <div class="profile-grid">
         <div class="field">
          <label>Email</label>
          <div class="val" id="p-email">–</div>
         </div>
         <div class="field">
          <label>Signed in since</label>
          <div class="val" id="p-joined">–</div>
         </div>
        </div>
       </div>

       <div class="card">
        <div class="sec-title">Quarterly goal</div>
        <div
         style="
          display: flex;
          justify-content: space-between;
          font-size: 13px;
          font-weight: 700;
         "
        >
         <span>$96,000 of $120,000</span><span>80%</span>
        </div>
        <div class="pbar"><i style="width: 80%"></i></div>
       </div>

       <div class="card">
        <div class="sec-title">Danger Zone</div>
        <p style="font-size: 13px; color: var(--muted); margin-bottom: 12px">
         Clear active clients cache and restore application state.
        </p>
        <button type="button" class="btn ghost" id="resetDataBtn">
         Reset Operational Data
        </button>
       </div>
      </div>

      <!-- Change Password -->
      <div class="profile-col-side">
       <div class="card">
        <div class="sec-title">Change Password</div>
        <form id="changePasswordForm">
         <label class="f">Current Password</label>
         <input type="password" id="currPass" placeholder="••••••••" required />
         <div class="field-error show" id="currPassError"></div>

         <label class="f">New Password</label>
         <input type="password" id="newPass" placeholder="••••••••" required />
         <div class="field-error show" id="newPassError"></div>

         <label class="f">Confirm New Password</label>
         <input
          type="password"
          id="confNewPass"
          placeholder="••••••••"
          required
         />
         <div class="field-error show" id="confNewPassError"></div>

         <button type="submit" class="btn" style="margin-top: 8px">
          Update Password
         </button>
        </form>
       </div>
      </div>
     </div>
    </div>
   </main>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/profile.js"></script>
 </body>
</html>
