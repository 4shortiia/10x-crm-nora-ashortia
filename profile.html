<!-- profile.html -->
<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <title>Ninja Identity Profile</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/guard.js"></script>
 </head>
 <body>
  <div class="app-container">
   <aside class="sidebar">
    <h2 class="sidebar-logo">
     <span class="anime-brand-text">🍥 Shinobi CRM</span>
    </h2>
    <ul class="nav-menu">
     <li class="nav-item"><a href="dashboard.html">🏠 Dashboard</a></li>
     <li class="nav-item"><a href="clients.html">👥 Clients Base</a></li>
     <li class="nav-item active">
      <a href="profile.html">👤 Ninja Profile</a>
     </li>
    </ul>
    <div class="sidebar-footer">
     <button
      id="themeToggleBtn"
      class="btn btn-primary"
      style="background: #4c6ef5"
     >
      ☯ Theme
     </button>
     <button id="logoutBtn" class="btn btn-danger">🚪 Log Out</button>
    </div>
   </aside>

   <main class="main-content">
    <!-- P5.1 Avatar Initials Info block [source: 1] -->
    <div
     class="dashboard-header"
     style="gap: 20px; justify-content: flex-start"
    >
     <div
      id="avatarBadge"
      style="
       width: 70px;
       height: 70px;
       background: var(--accent-color);
       color: white;
       border-radius: 50%;
       display: flex;
       justify-content: center;
       align-items: center;
       font-size: 1.8rem;
       font-weight: bold;
       box-shadow: var(--shadow-md);
      "
     ></div>
     <div>
      <h2 id="profTitleName">Master</h2>
      <p id="profEmailMeta" style="color: var(--text-muted)"></p>
      <small id="profJoinedMeta" style="color: var(--accent-color)"></small>
     </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem">
     <!-- Section A: Edit Profile [source: 1] -->
     <div class="stat-card">
      <h3>Modify Agent Credentials</h3>
      <form id="editProfileForm" style="margin-top: 1rem" novalidate>
       <div class="form-group">
        <label>Agent Name</label>
        <input type="text" id="profNameInput" class="form-control" />
        <span class="error-text" id="profNameError"></span>
       </div>
       <div class="form-group">
        <label>Brigade Affiliation</label>
        <input type="text" id="profCompanyInput" class="form-control" />
       </div>
       <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
     </div>

     <!-- Section B: Change Password [source: 1] -->
     <div class="stat-card">
      <h3>Alter Cipher Key (Password)</h3>
      <form id="changePasswordForm" style="margin-top: 1rem" novalidate>
       <div class="form-group">
        <label>Current Cipher</label>
        <input
         type="password"
         id="currPass"
         class="form-control"
         placeholder="••••••••"
        />
        <span class="error-text" id="currPassError"></span>
       </div>
       <div class="form-group">
        <label>New Seal Cipher</label>
        <input
         type="password"
         id="newPass"
         class="form-control"
         placeholder="••••••••"
        />
        <span class="error-text" id="newPassError"></span>
       </div>
       <div class="form-group">
        <label>Verify New Seal</label>
        <input
         type="password"
         id="confNewPass"
         class="form-control"
         placeholder="••••••••"
        />
        <span class="error-text" id="confNewPassError"></span>
       </div>
       <button
        type="submit"
        class="btn btn-primary"
        style="background: #4263eb"
       >
        Change Password
       </button>
      </form>
     </div>
    </div>

    <!-- Section C: Reset System database [source: 1] -->
    <div
     class="stat-card"
     style="margin-top: 2rem; border-color: var(--status-lost-text)"
    >
     <h3 style="color: var(--status-lost-text)">Danger Zone (Scroll Wiping)</h3>
     <p
      style="color: var(--text-muted); font-size: 0.9rem; margin: 5px 0 15px 0"
     >
      This clear out purges all custom operations states and re-pulls original
      baseline data nodes.
     </p>
     <button class="btn btn-danger" id="resetDataBtn" style="width: auto">
      🔥 Reset CRM Data
     </button>
    </div>
   </main>
  </div>
  <script src="js/profile.js"></script>
 </body>
</html>
