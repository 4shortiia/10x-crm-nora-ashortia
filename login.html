<!-- login.html -->
<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · 10x CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
   href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap"
   rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
 </head>
 <body>
  <script src="js/theme.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>

  <div class="auth-wrap">
   <div class="auth-card">
    <div class="auth-brand">
     <div class="brand-mark">10x</div>
     <div class="brand-name">10x<span>CRM</span></div>
    </div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to see today's pipeline.</div>

    <form onsubmit="handleLogin(event)">
     <label class="f">Email</label>
     <input
      id="li-email"
      type="email"
      placeholder="you@company.com"
      autocomplete="email"
     />
     <label class="f">Password</label>
     <input
      id="li-password"
      type="password"
      placeholder="Your password"
      autocomplete="current-password"
     />
     <div class="field-error" id="li-error"></div>
     <button class="btn" type="submit">Sign in</button>
    </form>

    <div class="auth-foot">
     New here? <a href="signup.html">Create an account</a>
    </div>
   </div>
  </div>
 </body>
</html>
