<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <title>Sign Up - 10X CRM</title>
  <link rel="stylesheet" href="css/styles.css" />
 </head>
 <body>
  <div class="auth-container">
   <h2>Create your account</h2>
   <form id="signup-form">
    <div class="form-group">
     <input type="text" id="fullName" placeholder="Full Name" />
     <div class="error-message" id="err-fullName"></div>
    </div>
    <div class="form-group">
     <input type="text" id="email" placeholder="Email" />
     <div class="error-message" id="err-email"></div>
    </div>
    <div class="form-group">
     <input type="text" id="company" placeholder="Company (optional)" />
     <div class="error-message" id="err-company"></div>
    </div>
    <div class="form-group">
     <input type="password" id="password" placeholder="Password" />
     <div class="error-message" id="err-password"></div>
    </div>
    <div class="form-group">
     <input
      type="password"
      id="confirmPassword"
      placeholder="Confirm Password"
     />
     <div class="error-message" id="err-confirmPassword"></div>
    </div>
    <button type="submit" class="btn">Create Account</button>
   </form>
   <p>Already have an account? <a href="index.html">Log in</a></p>
  </div>
  <script src="js/guard.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
 </body>
</html>
