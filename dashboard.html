<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <title>Dashboard - 10X CRM</title>
  <link rel="stylesheet" href="css/styles.css" />
 </head>
 <body>
  <nav class="navbar">
   <div class="logo">10X CRM</div>
   <div class="nav-links">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="clients.html">Clients</a>
    <a href="profile.html">Profile</a>
    <button
     id="theme-toggle"
     class="btn"
     style="width: auto; display: inline-block"
    >
     Theme
    </button>
    <a href="#" id="logout-btn">Logout</a>
   </div>
  </nav>
  <div class="main-content">
   <h2 id="welcome-message">Welcome back!</h2>
   <div class="stats-grid">
    <div class="stat-card">
     <h3>Total Clients</h3>
     <p id="stat-total">0</p>
    </div>
    <div class="stat-card">
     <h3>Active Deals</h3>
     <p id="stat-active">0</p>
    </div>
    <div class="stat-card">
     <h3>Won Revenue</h3>
     <p id="stat-revenue">$0</p>
    </div>
    <div class="stat-card">
     <h3>New This Week</h3>
     <p id="stat-week">0</p>
    </div>
   </div>
   <div>
    <h3>Pipeline Overview</h3>
    <p id="pipeline-summary">Loading...</p>
   </div>
   <div>
    <h3>Recent Clients</h3>
    <ul id="recent-clients-list"></ul>
    <a href="clients.html">View all clients &rarr;</a>
   </div>
  </div>
  <script src="js/guard.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/dashboard.js"></script>
 </body>
</html>
