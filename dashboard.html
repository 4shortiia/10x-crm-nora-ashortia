<!-- dashboard.html -->
<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8" />
  <title>Dashboard - Shinobi CRM</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/guard.js"></script>
 </head>
 <body>
  <div class="app-container">
   <!-- P0.2 - Sidebar Navigation Structure [source: 1] -->
   <aside class="sidebar">
    <h2 class="sidebar-logo">
     <span class="anime-brand-text">🍥 Shinobi CRM</span>
    </h2>
    <ul class="nav-menu">
     <li class="nav-item active"><a href="dashboard.html">🏠 Dashboard</a></li>
     <li class="nav-item"><a href="clients.html">👥 Clients Base</a></li>
     <li class="nav-item"><a href="profile.html">👤 Ninja Profile</a></li>
    </ul>
    <div class="sidebar-footer">
     <button
      id="themeToggleBtn"
      class="btn btn-primary"
      style="background: #4c6ef5"
     >
      ☯ Theme
     </button>
     <button id="logoutBtn" class="btn btn-danger">🚪 Log Out</button>
    </div>
   </aside>

   <main class="main-content">
    <header class="dashboard-header">
     <div>
      <h1 id="welcomeGreeting">Welcome back!</h1>
      <p style="color: var(--text-muted); margin-top: 5px">
       Your tactical field evaluation metrics.
      </p>
     </div>
     <div
      id="liveClock"
      style="font-weight: 600; font-size: 1.1rem; color: var(--accent-color)"
     ></div>
    </header>

    <!-- P3.2 - Four Business Stats cards [source: 1] -->
    <section class="stats-grid">
     <div class="stat-card">
      <h3>Total Contacts</h3>
      <div class="value" id="statTotal">0</div>
     </div>
     <div class="stat-card">
      <h3>Active Missions</h3>
      <div class="value" id="statActive">0</div>
     </div>
     <div class="stat-card">
      <h3>Bounty Won</h3>
      <div class="value" id="statWon">0</div>
     </div>
     <div class="stat-card">
      <h3>New This Week</h3>
      <div class="value" id="statNewWeek">0</div>
     </div>
    </section>

    <!-- P3.3 & P3.4 - Complex Pipeline overview and lists [source: 1] -->
    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem">
     <div class="stat-card">
      <h3>Pipeline Stages</h3>
      <div
       id="pipelineSummary"
       style="
        margin-top: 1rem;
        display: flex;
        flex-direction: column;
        gap: 10px;
       "
      ></div>
     </div>
     <div class="stat-card">
      <div
       style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
       "
      >
       <h3>Recent Reconnaissance Arrivals</h3>
       <a
        href="clients.html"
        style="
         color: var(--accent-color);
         text-decoration: none;
         font-weight: 600;
        "
        >View Full Scroll →</a
       >
      </div>
      <table
       style="width: 100%; border-collapse: collapse; text-align: left"
       id="recentClientsTable"
      ></table>
     </div>
    </div>
   </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/dashboard.js"></script>
 </body>
</html>
